name: Publish VibeEdit registry beta

on:
  workflow_dispatch:
    inputs:
      registry:
        description: Publish one registry per reviewed dispatch
        required: true
        type: choice
        options:
          - pypi
          - npm
      release_tag:
        description: Existing attested GitHub prerelease tag
        required: true
        default: v0.1.0-beta.1
        type: string
      confirmation:
        description: Enter publish:<registry>:<release_tag>
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: registry-beta-${{ inputs.registry }}-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish ${{ inputs.registry }} beta
    runs-on: ubuntu-latest
    environment: registry-beta
    permissions:
      contents: read
      id-token: write
      attestations: read
    steps:
      - name: Require exact publication confirmation
        env:
          CONFIRMATION: ${{ inputs.confirmation }}
          REGISTRY: ${{ inputs.registry }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          test "$CONFIRMATION" = "publish:$REGISTRY:$RELEASE_TAG"

      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Download exact GitHub prerelease assets
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          mkdir -p registry/python registry/npm
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.whl' --pattern '*.tar.gz' --dir registry/python
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern '*.tgz' --dir registry/npm
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --pattern 'SHA256SUMS.release' --pattern 'archive-audit.json' --dir registry

      - name: Validate identities, versions, checksums, and archive audit
        id: release
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          python scripts/validate_registry_release.py --directory registry --tag "$RELEASE_TAG" > registry/validated.json
          cat registry/validated.json
          echo "npm_version=$(jq -r .npmVersion registry/validated.json)" >> "$GITHUB_OUTPUT"
          echo "python_version=$(jq -r .pythonVersion registry/validated.json)" >> "$GITHUB_OUTPUT"

      - name: Verify GitHub build provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh attestation verify registry/python/*.whl --repo "$GITHUB_REPOSITORY"
          gh attestation verify registry/python/*.tar.gz --repo "$GITHUB_REPOSITORY"
          gh attestation verify registry/npm/*.tgz --repo "$GITHUB_REPOSITORY"

      - name: Require npm trusted-publishing runtime
        if: inputs.registry == 'npm'
        run: |
          npm install --global npm@11.18.0
          test "$(npm --version)" = "11.18.0"

      - name: Publish npm beta through OIDC
        if: inputs.registry == 'npm'
        run: npm publish registry/npm/*.tgz --tag beta --access public

      - name: Publish Python beta through OIDC
        if: inputs.registry == 'pypi'
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0
        with:
          packages-dir: registry/python
          print-hash: true
          verbose: true

      - name: Verify exact npm beta through a clean public install
        if: inputs.registry == 'npm'
        env:
          NPM_VERSION: ${{ steps.release.outputs.npm_version }}
        run: |
          for attempt in $(seq 1 18); do
            RESOLVED_VERSION="$(npm view "vibeedit@$NPM_VERSION" version 2>/dev/null || true)"
            if [ "$RESOLVED_VERSION" = "$NPM_VERSION" ]; then
              break
            fi
            if [ "$attempt" = 18 ]; then
              echo "npm did not expose vibeedit@$NPM_VERSION within three minutes" >&2
              exit 1
            fi
            sleep 10
          done
          WORKSPACE="$(mktemp -d)"
          cd "$WORKSPACE"
          npm init --yes
          npm install --ignore-scripts --no-audit --no-fund "vibeedit@$NPM_VERSION"
          test "$(./node_modules/.bin/vibeedit --version)" = "vibeedit $NPM_VERSION"

      - name: Verify exact Python beta through a clean public install
        if: inputs.registry == 'pypi'
        env:
          PYTHON_VERSION: ${{ steps.release.outputs.python_version }}
        run: |
          for attempt in $(seq 1 18); do
            if curl --fail --silent --show-error "https://pypi.org/pypi/vibeedit/$PYTHON_VERSION/json" > /dev/null; then
              break
            fi
            if [ "$attempt" = 18 ]; then
              echo "PyPI did not expose vibeedit==$PYTHON_VERSION within three minutes" >&2
              exit 1
            fi
            sleep 10
          done
          python -m venv "${RUNNER_TEMP}/vibeedit-registry-proof"
          "${RUNNER_TEMP}/vibeedit-registry-proof/bin/python" -m pip install --disable-pip-version-check --no-cache-dir --index-url https://pypi.org/simple "vibeedit==$PYTHON_VERSION"
          test "$("${RUNNER_TEMP}/vibeedit-registry-proof/bin/vibeedit" --version)" = "vibeedit $PYTHON_VERSION"
